name: "Mejora de documentación"
description: "Reportar documentación incorrecta, incompleta o confusa"
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        La documentación clara es fundamental en un proyecto educativo.
        Tu feedback nos ayuda a mejorarla.

  - type: dropdown
    id: tipo_doc
    attributes:
      label: "Tipo de documentación"
      options:
        - Comentarios Doxygen en código
        - README o Markdown
        - Ejemplo de uso
        - Guía de instalación
        - Guía de hardware
    validations:
      required: true

  - type: input
    id: archivo
    attributes:
      label: "Archivo o librería afectada"
      placeholder: "ej. gpio_mcxa15x.h, docs/LIBRERIAS.md"
    validations:
      required: true

  - type: textarea
    id: problema
    attributes:
      label: "¿Qué está mal o falta?"
      description: "Describe qué es incorrecto, confuso o incompleto"
    validations:
      required: true

  - type: textarea
    id: sugerencia
    attributes:
      label: "Sugerencia de mejora"
      description: "¿Cómo crees que debería corregirse o mejorarse?"
